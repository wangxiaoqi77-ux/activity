<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vivo活动管理审批系统 v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .phone-mockup {
            width: 320px; height: 660px; border: 14px solid #1f2937;
            border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden; position: relative; background-color: #ffffff; flex-shrink: 0;
        }
        .phone-notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 130px; height: 25px; background-color: #1f2937;
            border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 50;
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-dot {
            width: 6px; height: 6px; background: #22c55e;
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .status-badge {
            padding: 4px 10px; border-radius: 9999px;
            font-size: 11px; font-weight: 500;
        }
        .status-draft { background: #f3f4f6; color: #6b7280; }
        .status-pending { background: #dbeafe; color: #1e40af; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-published { background: #c7d2fe; color: #4338ca; }
    </style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app">
        <!-- 主应用界面 - 直接进入，无需登录 -->
        <template v-if="true">
            <!-- 顶部导航 -->
            <nav class="bg-white border-b px-6 py-4 sticky top-0 z-40">
                <div class="flex items-center justify-between max-w-[1600px] mx-auto">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fas fa-rocket"></i>
                        </div>
                        <div>
                            <h1 class="font-bold text-gray-900 text-lg">vivo活动管理审批系统 v2</h1>
                            <div class="flex items-center gap-2 text-xs text-gray-500">
                                <span v-if="true === false" class="flex items-center gap-1">
                                    <span class="pulse-dot"></span> 正在同步...
                                </span>
                                <span v-else-if="syncStatus === 'synced'" class="flex items-center gap-1 text-green-600">
                                    <i class="fas fa-check-circle text-[10px]"></i> 已同步
                                </span>
                                <span v-else class="text-orange-500 flex items-center gap-1">
                                    <i class="fas fa-wifi text-[10px]"></i> 本地模式
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button @click="showConfigModal = true" class="px-3 py-1.5 text-sm text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-colors flex items-center gap-1.5">
                            <i class="fas fa-cog"></i> 设置
                        </button>
                        <button @click="refreshData" class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors">
                            <i class="fas fa-sync-alt" :class="{'fa-spin': isLoading}"></i> 刷新
                        </button>
                        <div class="h-4 w-px bg-gray-200 mx-1"></div>
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-sm font-medium">
                                {{ userInfo.name?.charAt(0) || '王' }}
                            </div>
                            <span class="text-sm text-gray-600">{{ userInfo.name || '王晓琪' }}</span>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="max-w-[1600px] mx-auto p-6">
                <div class="grid grid-cols-12 gap-6">
                    
                    <!-- 左侧：我的工作区 -->
                    <div class="col-span-3 space-y-4">
                        <!-- 快速操作 -->
                        <div class="bg-white rounded-xl shadow-sm border p-4">
                            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <i class="fas fa-bolt text-yellow-500"></i> 快速操作
                            </h3>
                            <div class="space-y-2">
                                <button @click="startNewDraft" 
                                        class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center justify-center gap-2">
                                    <i class="fas fa-plus"></i> 新建活动草稿
                                </button>
                            </div>
                        </div>

                        <!-- 状态筛选 -->
                        <div class="bg-white rounded-xl shadow-sm border p-4">
                            <h3 class="font-bold text-gray-800 mb-3 text-sm">我的活动</h3>
                            <div class="space-y-1">
                                <button v-for="filter in statusFilters" :key="filter.key"
                                        @click="currentFilter = filter.key"
                                        class="w-full px-3 py-2 rounded-lg flex items-center justify-between transition-colors text-sm"
                                        :class="currentFilter === filter.key ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-50 text-gray-600'">
                                    <span class="flex items-center gap-2">
                                        <i :class="filter.icon" :style="{color: filter.color}"></i>
                                        {{ filter.label }}
                                    </span>
                                    <span class="text-xs font-medium" :class="getActivityCount(filter.key) > 0 ? 'text-gray-900' : 'text-gray-300'">
                                        {{ getActivityCount(filter.key) }}
                                    </span>
                                </button>
                            </div>
                        </div>

                        <!-- 使用说明 -->
                        <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl border border-indigo-100 p-4">
                            <h4 class="font-medium text-indigo-900 text-sm mb-2 flex items-center gap-2">
                                <i class="fas fa-lightbulb text-yellow-500"></i> 工作流程
                            </h4>
                            <div class="space-y-2 text-xs text-indigo-700">
                                <p class="flex items-start gap-2">
                                    <span class="bg-indigo-200 text-indigo-800 rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-medium">1</span>
                                    填写活动信息，自动保存
                                </p>
                                <p class="flex items-start gap-2">
                                    <span class="bg-indigo-200 text-indigo-800 rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-medium">2</span>
                                    点击提交审批
                                </p>
                                <p class="flex items-start gap-2">
                                    <span class="bg-indigo-200 text-indigo-800 rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-medium">3</span>
                                    审批人审核后提交到商店
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- 中间：活动列表 -->
                    <div class="col-span-3 space-y-4">
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <div class="px-4 py-3 border-b flex items-center justify-between">
                                <h3 class="font-bold text-gray-800 flex items-center gap-2">
                                    <i class="fas fa-list-ul text-gray-400"></i>
                                    {{ getFilterLabel() }}
                                </h3>
                                <span class="text-xs text-gray-500">{{ filteredActivities.length }} 个活动</span>
                            </div>
                            <div class="h-[calc(100vh-280px)] overflow-y-auto scrollbar-hide">
                                <div v-if="filteredActivities.length === 0" class="p-8 text-center text-gray-400">
                                    <i class="fas fa-inbox text-4xl mb-3 text-gray-200"></i>
                                    <p class="text-sm">暂无活动</p>
                                    <button @click="startNewDraft" class="mt-3 text-sm text-blue-600 hover:underline">创建新活动</button>
                                </div>
                                <div v-for="activity in filteredActivities" :key="activity.id"
                                     @click="selectActivity(activity)"
                                     class="p-4 border-b hover:bg-gray-50 cursor-pointer transition-colors"
                                     :class="selectedActivity?.id === activity.id ? 'bg-blue-50 border-l-4 border-l-blue-500' : 'border-l-4 border-l-transparent'">
                                    <div class="flex items-start justify-between mb-2">
                                        <span class="font-medium text-sm truncate flex-1">{{ activity.title || '未命名活动' }}</span>
                                        <span class="status-badge ml-2 flex-shrink-0" :class="getStatusClass(activity.status)">
                                            {{ getStatusText(activity.status) }}
                                        </span>
                                    </div>
                                    <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
                                        <span class="px-1.5 py-0.5 bg-gray-100 rounded">{{ activity.appName }}</span>
                                        <span v-if="activity.tag" class="px-1.5 py-0.5 rounded" :class="getTagClass(activity.tag)">{{ activity.tag }}</span>
                                    </div>
                                    <div class="text-xs text-gray-400 flex items-center gap-1">
                                        <i class="far fa-clock"></i> {{ formatTime(activity.updatedAt) }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：编辑 & 预览区 -->
                    <div class="col-span-6 space-y-4">
                        <div v-if="!selectedActivity" class="bg-white rounded-xl shadow-sm border p-8 text-center">
                            <i class="fas fa-hand-pointer text-6xl text-gray-200 mb-4"></i>
                            <h3 class="font-bold text-gray-700 mb-2">选择一个活动开始编辑</h3>
                            <p class="text-sm text-gray-500 mb-4">或者创建一个新的活动草稿</p>
                            <button @click="startNewDraft" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                                <i class="fas fa-plus mr-2"></i> 新建活动
                            </button>
                        </div>

                        <template v-else>
                            <!-- 编辑区 -->
                            <div class="bg-white rounded-xl shadow-sm border overflow-hidden fade-in">
                                <div class="px-4 py-3 border-b flex items-center justify-between bg-gray-50/50">
                                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                                        <i class="fas fa-pen-to-square text-gray-400"></i>
                                        编辑活动信息
                                    </h3>
                                    <div class="flex items-center gap-2">
                                        <span v-if="isDirty" class="text-xs text-orange-600 flex items-center gap-1">
                                            <i class="fas fa-circle text-[6px]"></i> 有未保存更改
                                        </span>
                                        <span v-else class="text-xs text-green-600">
                                            <i class="fas fa-check-circle text-[10px]"></i> 已保存
                                        </span>
                                    </div>
                                </div>

                                <div class="p-4 space-y-4 max-h-[320px] overflow-y-auto scrollbar-hide">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-1.5">
                                                <span class="text-red-500">*</span> 应用名称
                                            </label>
                                            <input v-model="editForm.appName" @input="autoSave" type="text"
                                                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-1.5">
                                                <span class="text-red-500">*</span> 标签
                                            </label>
                                            <select v-model="editForm.tag" @change="autoSave"
                                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                                <option value="">请选择</option>
                                                <option value="首发">首发</option>
                                                <option value="独家">独家</option>
                                                <option value="热门活动">热门活动</option>
                                                <option value="限时福利">限时福利</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                                            <span class="text-red-500">*</span> 活动标题
                                        </label>
                                        <input v-model="editForm.title" @input="autoSave" maxlength="34" type="text"
                                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                        <div class="text-right text-[10px] text-gray-400 mt-0.5">{{ editForm.title?.length || 0 }}/34</div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                                            <span class="text-red-500">*</span> 副标题
                                        </label>
                                        <input v-model="editForm.subtitle" @input="autoSave" maxlength="18" type="text"
                                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                        <div class="text-right text-[10px] text-gray-400 mt-0.5">{{ editForm.subtitle?.length || 0 }}/18</div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1.5">
                                            <span class="text-red-500">*</span> 活动介绍
                                        </label>
                                        <textarea v-model="editForm.intro" @input="autoSave" maxlength="69" rows="2"
                                                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                                        <div class="text-right text-[10px] text-gray-400 mt-0.5">{{ editForm.intro?.length || 0 }}/69</div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-1.5">封面图 (936×540)</label>
                                            <label class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors relative overflow-hidden">
                                                <img v-if="editForm.coverImage" :src="editForm.coverImage" class="object-cover w-full h-full absolute inset-0">
                                                <div v-else class="text-gray-400 text-xs flex flex-col items-center">
                                                    <i class="fas fa-cloud-upload-alt mb-1"></i>点击上传
                                                </div>
                                                <input type="file" class="hidden" accept="image/*" @change="handleImageUpload($event, 'coverImage')">
                                            </label>
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-1.5">详情图 (1080×1920)</label>
                                            <label class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors relative overflow-hidden">
                                                <img v-if="editForm.detailImage" :src="editForm.detailImage" class="object-cover w-full h-full absolute inset-0">
                                                <div v-else class="text-gray-400 text-xs flex flex-col items-center">
                                                    <i class="fas fa-cloud-upload-alt mb-1"></i>点击上传
                                                </div>
                                                <input type="file" class="hidden" accept="image/*" @change="handleImageUpload($event, 'detailImage')">
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <!-- 操作按钮 -->
                                <div class="px-4 py-3 border-t bg-gray-50 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <button @click="deleteActivity" class="px-3 py-1.5 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                                            <i class="fas fa-trash-alt"></i> 删除
                                        </button>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <button @click="submitForApproval" :disabled="!canSubmit"
                                                class="px-4 py-1.5 text-sm bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white rounded-lg transition-colors flex items-center gap-1.5">
                                            <i class="fas fa-paper-plane"></i> 提交审批
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 审批状态显示 -->
                            <div v-if="selectedActivity.status !== 'draft'" class="bg-white rounded-xl shadow-sm border p-4 fade-in">
                                <div class="flex items-center justify-between mb-3">
                                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                                        <i class="fas fa-clipboard-check text-gray-400"></i>
                                        审批状态
                                    </h3>
                                    <span class="status-badge" :class="getStatusClass(selectedActivity.status)">
                                        {{ getStatusText(selectedActivity.status) }}
                                    </span>
                                </div>
                                <div v-if="selectedActivity.approver" class="text-sm text-gray-600 space-y-1">
                                    <p>审批人: <span class="font-medium">{{ selectedActivity.approver }}</span></p>
                                    <p v-if="selectedActivity.approvalTime">审批时间: {{ selectedActivity.approvalTime }}</p>
                                    <p v-if="selectedActivity.approvalComment" class="text-gray-500 italic bg-gray-50 p-2 rounded mt-2">
                                        审批意见: {{ selectedActivity.approvalComment }}
                                    </p>
                                </div>
                                <p v-else class="text-sm text-gray-500">等待审批中...</p>

                                <!-- 审批人操作 -->
                                <div v-if="canApprove" class="mt-4 pt-4 border-t flex gap-2">
                                    <button @click="approveActivity(true)" class="flex-1 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm transition-colors">
                                        <i class="fas fa-check mr-1"></i> 审批通过
                                    </button>
                                    <button @click="approveActivity(false)" class="flex-1 py-2 border border-red-300 hover:bg-red-50 text-red-600 rounded-lg text-sm transition-colors">
                                        <i class="fas fa-times mr-1"></i> 拒绝
                                    </button>
                                </div>
                            </div>

                            <!-- 预览区 -->
                            <div class="bg-white rounded-xl shadow-sm border p-4">
                                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <i class="fas fa-mobile-screen text-gray-400"></i>
                                    效果预览
                                </h3>
                                <div class="flex justify-center gap-6">
                                    <!-- 应用详情页预览 -->
                                    <div class="phone-mockup flex flex-col bg-gray-50">
                                        <div class="phone-notch"></div>
                                        <div class="h-8 flex justify-between items-end px-4 pb-0.5 text-[9px] font-medium bg-white">
                                            <span>09:40</span>
                                            <div class="flex gap-1"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
                                        </div>
                                        <div class="flex-1 overflow-hidden bg-gray-100">
                                            <div class="bg-white px-3 py-2 flex justify-between items-center text-xs">
                                                <i class="fas fa-chevron-left"></i>
                                                <div class="flex gap-2 text-gray-500"><i class="fas fa-search"></i><i class="fas fa-download"></i></div>
                                            </div>
                                            <div class="bg-white p-3 text-[10px] text-gray-600">
                                                <div class="flex gap-1 mb-2">
                                                    <span class="bg-blue-50 text-blue-600 px-1 rounded">社交 ></span>
                                                </div>
                                            </div>
                                            <div class="mt-1.5 bg-white p-3">
                                                <div class="flex justify-between mb-2"><span class="font-bold text-xs">活动</span><span class="text-[9px] text-gray-400">活动时间 ></span></div>
                                                <div class="relative w-full h-[100px] bg-gray-200 rounded-lg overflow-hidden">
                                                    <img v-if="editForm.coverImage" :src="editForm.coverImage" class="w-full h-full object-cover">
                                                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 p-2">
                                                        <span v-if="editForm.tag" class="bg-[#ff2a5f] text-white text-[8px] px-1 rounded">{{editForm.tag}}</span>
                                                        <h4 class="text-white font-bold text-[10px] truncate mt-0.5">{{editForm.title || '活动标题'}}</h4>
                                                        <p class="text-white/80 text-[8px] truncate">{{editForm.subtitle || '副标题'}}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 全屏详情页预览 -->
                                    <div class="phone-mockup flex flex-col bg-gray-900 relative">
                                        <div class="phone-notch bg-gray-900"></div>
                                        <div class="w-full h-full relative">
                                            <img v-if="editForm.detailImage" :src="editForm.detailImage" class="w-full h-full object-cover">
                                            <div v-else class="w-full h-full flex items-center justify-center text-gray-600 text-xs">详情图</div>
                                            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/70 p-4 pb-6">
                                                <span v-if="editForm.tag" class="bg-white/20 text-white text-[8px] px-1.5 py-0.5 rounded">{{editForm.tag}}</span>
                                                <h2 class="text-white font-bold text-sm mt-1">{{editForm.title || '活动标题'}}</h2>
                                                <p class="text-white/70 text-[10px] mt-0.5 line-clamp-2">{{editForm.intro || '活动介绍'}}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- 配置弹窗 -->
        <div v-if="showConfigModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl max-w-md w-full p-6">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-cog text-gray-400"></i> 系统设置
                </h3>
                <div class="space-y-4">
                    <div class="p-3 bg-yellow-50 rounded-lg text-sm text-yellow-800">
                        <i class="fas fa-info-circle mr-1"></i>
                        当前为本地模式，数据保存在浏览器中
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input v-model="userInfo.name" type="text" 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input v-model="userInfo.email" type="email" 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button @click="showConfigModal = false" class="flex-1 py-2 border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">取消</button>
                    <button @click="saveConfig" class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">保存</button>
                </div>
            </div>
        </div>

        <!-- 审批弹窗 -->
        <div v-if="showApproveModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl max-w-md w-full p-6">
                <h3 class="font-bold text-lg mb-2">{{ approveAction === 'approve' ? '审批通过' : '拒绝活动' }}</h3>
                <textarea v-model="approvalComment" rows="3" placeholder="请输入审批意见（可选）"
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none mb-4 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                <div class="flex gap-2">
                    <button @click="showApproveModal = false" class="flex-1 py-2 border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">取消</button>
                    <button @click="confirmApproval" :disabled="isProcessing"
                            class="flex-1 py-2 rounded-lg transition-colors flex items-center justify-center gap-1"
                            :class="approveAction === 'approve' ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-red-600 hover:bg-red-700 text-white'">
                        <i v-if="isProcessing" class="fas fa-spinner fa-spin"></i>
                        {{ approveAction === 'approve' ? '确认通过' : '确认拒绝' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- 提交确认弹窗 -->
        <div v-if="showSubmitModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl max-w-md w-full p-6">
                <h3 class="font-bold text-lg mb-2">提交活动审批</h3>
                <p class="text-sm text-gray-600 mb-4">确认提交后将通知审批人审核。</p>
                <div class="bg-gray-50 rounded-lg p-3 mb-4 text-sm space-y-1">
                    <p><span class="text-gray-500">应用:</span> {{ editForm.appName }}</p>
                    <p><span class="text-gray-500">标签:</span> {{ editForm.tag }}</p>
                    <p><span class="text-gray-500">标题:</span> {{ editForm.title }}</p>
                </div>
                <div class="flex gap-2">
                    <button @click="showSubmitModal = false" class="flex-1 py-2 border border-gray-300 hover:bg-gray-50 rounded-lg">取消</button>
                    <button @click="confirmSubmit" :disabled="isProcessing"
                            class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white rounded-lg flex items-center justify-center gap-1">
                        <i v-if="isProcessing" class="fas fa-spinner fa-spin"></i>
                        确认提交
                    </button>
                </div>
            </div>
        </div>

        <!-- 全局通知 -->
        <div v-if="notification.show" 
             class="fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2"
             :class="notification.type === 'success' ? 'bg-green-500 text-white' : notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'">
            <i :class="notification.icon"></i>
            <span>{{ notification.message }}</span>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, computed, onMounted } = Vue;

        createApp({
            setup() {
                // 用户信息
                const userInfo = reactive({
                    name: localStorage.getItem('user_name') || '王晓琪',
                    email: localStorage.getItem('user_email') || 'wangxiaoqi.77@bytedance.com'
                });

                // 状态
                const syncStatus = ref('local'); // local, syncing, synced
                const isLoading = ref(false);
                const isDirty = ref(false);
                const isProcessing = ref(false);
                const showConfigModal = ref(false);
                const showSubmitModal = ref(false);
                const showApproveModal = ref(false);
                const approveAction = ref('');
                const approvalComment = ref('');

                // 筛选
                const currentFilter = ref('all');
                const statusFilters = [
                    { key: 'all', label: '全部活动', icon: 'fas fa-layer-group', color: '#6b7280' },
                    { key: 'draft', label: '我的草稿', icon: 'fas fa-pencil-alt', color: '#9ca3af' },
                    { key: 'pending', label: '待审批', icon: 'fas fa-clock', color: '#3b82f6' },
                    { key: 'approved', label: '审批通过', icon: 'fas fa-check-circle', color: '#22c55e' },
                    { key: 'rejected', label: '已拒绝', icon: 'fas fa-times-circle', color: '#ef4444' }
                ];

                // 活动数据（从 localStorage 加载）
                const loadActivitiesFromStorage = () => {
                    const saved = localStorage.getItem('activities');
                    if (saved) {
                        return JSON.parse(saved);
                    }
                    return []; // 初始为空
                };

                const activities = ref(loadActivitiesFromStorage());
                const selectedActivity = ref(null);
                const editForm = reactive({
                    appName: 'PICO',
                    tag: '',
                    title: '',
                    subtitle: '',
                    intro: '',
                    coverImage: '',
                    detailImage: ''
                });

                // 保存到 localStorage
                const saveToStorage = () => {
                    localStorage.setItem('activities', JSON.stringify(activities.value));
                    isDirty.value = false;
                    syncStatus.value = 'synced';
                };

                // 通知
                const notification = reactive({
                    show: false, type: 'info', message: '', icon: 'fas fa-info-circle'
                });
                const showNotification = (message, type = 'info') => {
                    notification.message = message;
                    notification.type = type;
                    notification.icon = type === 'success' ? 'fas fa-check-circle' : 
                                      type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-info-circle';
                    notification.show = true;
                    setTimeout(() => notification.show = false, 3000);
                };

                // 防抖自动保存
                let autoSaveTimer = null;
                const autoSave = () => {
                    isDirty.value = true;
                    clearTimeout(autoSaveTimer);
                    autoSaveTimer = setTimeout(() => {
                        if (selectedActivity.value) {
                            Object.assign(selectedActivity.value, {
                                appName: editForm.appName,
                                tag: editForm.tag,
                                title: editForm.title,
                                subtitle: editForm.subtitle,
                                intro: editForm.intro,
                                coverImage: editForm.coverImage,
                                detailImage: editForm.detailImage,
                                updatedAt: new Date().toISOString()
                            });
                            saveToStorage();
                            showNotification('已自动保存', 'success');
                        }
                    }, 1000);
                };

                // 筛选后的活动
                const filteredActivities = computed(() => {
                    if (currentFilter.value === 'all') return activities.value;
                    return activities.value.filter(a => a.status === currentFilter.value);
                });

                const canSubmit = computed(() => {
                    return editForm.appName && editForm.tag && editForm.title;
                });

                const canApprove = computed(() => {
                    return selectedActivity.value?.status === 'pending';
                });

                // 方法
                const getActivityCount = (status) => {
                    if (status === 'all') return activities.value.length;
                    return activities.value.filter(a => a.status === status).length;
                };

                const getFilterLabel = () => {
                    const f = statusFilters.find(x => x.key === currentFilter.value);
                    return f?.label || '全部活动';
                };

                const getStatusClass = (status) => {
                    const map = { 'draft': 'status-draft', 'pending': 'status-pending', 'approved': 'status-approved', 'rejected': 'status-rejected', 'published': 'status-published' };
                    return map[status] || 'status-draft';
                };

                const getStatusText = (status) => ({
                    'draft': '草稿', 'pending': '待审批', 'approved': '审批通过', 'rejected': '已拒绝', 'published': '已发布'
                })[status] || status;

                const getTagClass = (tag) => ({
                    '首发': 'bg-red-100 text-red-700', '独家': 'bg-purple-100 text-purple-700',
                    '热门活动': 'bg-orange-100 text-orange-700', '限时福利': 'bg-green-100 text-green-700'
                })[tag] || 'bg-gray-100 text-gray-700';

                const formatTime = (iso) => {
                    if (!iso) return '';
                    const d = new Date(iso);
                    const now = new Date();
                    const diff = Math.floor((now - d) / 1000);
                    if (diff < 60) return '刚刚';
                    if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
                    if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
                    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                };

                // 新建草稿
                const startNewDraft = () => {
                    const newActivity = {
                        id: Date.now().toString(),
                        appName: 'PICO', tag: '', title: '', subtitle: '', intro: '',
                        coverImage: '', detailImage: '', status: 'draft',
                        submitter: userInfo.name, submitterEmail: userInfo.email,
                        approver: '', approvalTime: '', approvalComment: '',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    activities.value.unshift(newActivity);
                    selectActivity(newActivity);
                    saveToStorage();
                    showNotification('已创建新草稿', 'success');
                };

                // 选择活动
                const selectActivity = (activity) => {
                    selectedActivity.value = activity;
                    Object.assign(editForm, {
                        appName: activity.appName || '', tag: activity.tag || '',
                        title: activity.title || '', subtitle: activity.subtitle || '',
                        intro: activity.intro || '', coverImage: activity.coverImage || '',
                        detailImage: activity.detailImage || ''
                    });
                    isDirty.value = false;
                };

                // 图片上传
                const handleImageUpload = (e, field) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        editForm[field] = ev.target.result;
                        autoSave();
                    };
                    reader.readAsDataURL(file);
                };

                // 提交审批
                const submitForApproval = () => {
                    showSubmitModal.value = true;
                };

                const confirmSubmit = () => {
                    isProcessing.value = true;
                    setTimeout(() => {
                        selectedActivity.value.status = 'pending';
                        saveToStorage();
                        showSubmitModal.value = false;
                        isProcessing.value = false;
                        showNotification('已提交审批', 'success');
                        
                        // 这里可以调用飞书API发送消息给审批人
                        console.log('通知审批人:', selectedActivity.value);
                    }, 800);
                };

                // 审批
                const approveActivity = (approve) => {
                    approveAction.value = approve ? 'approve' : 'reject';
                    approvalComment.value = '';
                    showApproveModal.value = true;
                };

                const confirmApproval = () => {
                    isProcessing.value = true;
                    const newStatus = approveAction.value === 'approve' ? 'approved' : 'rejected';
                    
                    selectedActivity.value.status = newStatus;
                    selectedActivity.value.approver = userInfo.name;
                    selectedActivity.value.approvalTime = new Date().toLocaleString();
                    selectedActivity.value.approvalComment = approvalComment.value;
                    saveToStorage();
                    
                    if (approveAction.value === 'approve') {
                        setTimeout(() => {
                            selectedActivity.value.status = 'published';
                            saveToStorage();
                            showNotification('已自动提交到vivo商店', 'success');
                        }, 2000);
                    }
                    
                    showApproveModal.value = false;
                    isProcessing.value = false;
                    showNotification(approveAction.value === 'approve' ? '审批通过' : '已拒绝', 'success');
                };

                // 删除
                const deleteActivity = () => {
                    if (!confirm('确定删除此活动？')) return;
                    const idx = activities.value.findIndex(a => a.id === selectedActivity.value.id);
                    if (idx > -1) {
                        activities.value.splice(idx, 1);
                        saveToStorage();
                        selectedActivity.value = null;
                        showNotification('已删除', 'success');
                    }
                };

                // 刷新
                const refreshData = () => {
                    isLoading.value = true;
                    setTimeout(() => {
                        activities.value = loadActivitiesFromStorage();
                        isLoading.value = false;
                        showNotification('数据已刷新', 'success');
                    }, 500);
                };

                // 配置保存
                const saveConfig = () => {
                    localStorage.setItem('user_name', userInfo.name);
                    localStorage.setItem('user_email', userInfo.email);
                    showConfigModal.value = false;
                    showNotification('设置已保存', 'success');
                };

                return {
                    userInfo, syncStatus, isLoading, isDirty, isProcessing,
                    showConfigModal, showSubmitModal, showApproveModal,
                    approveAction, approvalComment, currentFilter, statusFilters,
                    activities, filteredActivities, selectedActivity, editForm,
                    canSubmit, canApprove, notification,
                    getActivityCount, getFilterLabel, getStatusClass, getStatusText,
                    getTagClass, formatTime, startNewDraft, selectActivity,
                    autoSave, handleImageUpload, submitForApproval, confirmSubmit,
                    approveActivity, confirmApproval, deleteActivity, refreshData, saveConfig
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
